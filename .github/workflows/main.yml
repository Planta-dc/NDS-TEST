name: Build DSi MP3 Player

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Cache the entire Wonderful toolchain ───────────────────────────
      # Keyed on the bootstrap URL so the cache busts when upstream updates.
      - name: Cache Wonderful Toolchain
        id: cache-wf
        uses: actions/cache@v4
        with:
          path: /opt/wonderful
          key: wonderful-blocksds-libmad-x86_64-v1

      # ── 3. Install Wonderful Toolchain + BlocksDS + libmad ────────────────
      # Only runs on a cache miss.
      # Bootstrap URL from: https://wonderful.asie.pl/wiki/doku.php?id=getting_started:linux
      - name: Install Wonderful Toolchain
        if: steps.cache-wf.outputs.cache-hit != 'true'
        run: |
          sudo apt-get install -y ca-certificates
          sudo mkdir -p /opt/wonderful
          sudo chown -R "$USER" /opt/wonderful
          curl -L https://wonderful.asie.pl/bootstrap/wf-bootstrap-x86_64.tar.gz \
            | tar -xz -C /opt/wonderful
          /opt/wonderful/bin/wf-pacman -Syu --noconfirm wf-tools

      - name: Install BlocksDS via wf-pacman
        if: steps.cache-wf.outputs.cache-hit != 'true'
        run: |
          /opt/wonderful/bin/wf-pacman -S --noconfirm blocksds-toolchain

      - name: Install libmad via wf-pacman
        if: steps.cache-wf.outputs.cache-hit != 'true'
        run: |
          /opt/wonderful/bin/wf-pacman -S --noconfirm blocksds-libmad

      # ── 4. Add Wonderful bin to PATH for all subsequent steps ─────────────
      - name: Configure environment
        run: |
          echo "/opt/wonderful/bin" >> $GITHUB_PATH
          echo "WONDERFUL_TOOLCHAIN=/opt/wonderful" >> $GITHUB_ENV
          echo "BLOCKSDS=/opt/wonderful/thirdparty/blocksds/core" >> $GITHUB_ENV
          echo "BLOCKSDSEXT=/opt/wonderful/thirdparty/blocksds/external" >> $GITHUB_ENV

      # ── 5. Build ARM7 ─────────────────────────────────────────────────────
      - name: Build ARM7
        run: make -f arm7/Makefile -j$(nproc)

      # ── 6. Build ARM9 ─────────────────────────────────────────────────────
      - name: Build ARM9
        run: make -f arm9/Makefile -j$(nproc)

      # ── 7. Link final ROM ─────────────────────────────────────────────────
      - name: Link ROM
        run: make DSi_MP3_Player.nds

      # ── 8. Verify ROM size (DSi card limit: 32 MB) ────────────────────────
      - name: Verify ROM size
        run: |
          SIZE=$(stat -c%s DSi_MP3_Player.nds)
          MAX=$((32 * 1024 * 1024))
          echo "ROM size: $SIZE bytes (limit: $MAX)"
          if [ "$SIZE" -gt "$MAX" ]; then
            echo "::error file=DSi_MP3_Player.nds::ROM exceeds 32 MB DSi card limit ($SIZE bytes)"
            exit 1
          fi

      # ── 9. Upload .nds as a build artifact ────────────────────────────────
      - name: Upload ROM artifact
        uses: actions/upload-artifact@v4
        with:
          name: DSi_MP3_Player-${{ github.sha }}
          path: DSi_MP3_Player.nds
          retention-days: 14

      # ── 10. Comment download link on pull requests ────────────────────────
      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `### Build succeeded\n\nDownload **DSi_MP3_Player.nds** from the [Actions run](${runUrl}) artifacts tab.\n\nCommit: \`${context.sha.slice(0,7)}\``
            });

      # ── 11. Annotate failure clearly ──────────────────────────────────────
      - name: Annotate on failure
        if: failure()
        run: echo "::error::Build failed — check the steps above for details"
