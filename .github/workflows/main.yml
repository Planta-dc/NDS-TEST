name: Build DSi MP3 Player

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Install Wonderful Toolchain (GCC for arm-none-eabi) ────────────
      - name: Install Wonderful Toolchain
        run: |
          curl -LO https://wonderful.asie.pl/files/linux-x86_64/toolchain-gcc-arm-none-eabi.tar.zst
          sudo mkdir -p /opt/wonderful/toolchain
          sudo tar -C /opt/wonderful/toolchain -xf toolchain-gcc-arm-none-eabi.tar.zst
          echo "/opt/wonderful/toolchain/gcc-arm-none-eabi/bin" >> $GITHUB_PATH

      # ── 3. Install BlocksDS ───────────────────────────────────────────────
      - name: Install BlocksDS
        run: |
          curl -LO https://github.com/blocksds/sdk/releases/latest/download/blocksds-linux-x86_64.tar.gz
          sudo tar -C /opt -xzf blocksds-linux-x86_64.tar.gz
          # BlocksDS extracts to /opt/blocksds/core by convention

      # ── 4. Install libmad (BlocksDS external package) ─────────────────────
      - name: Install libmad
        run: |
          # wf-pacman is the Wonderful package manager shipped with BlocksDS
          sudo /opt/wonderful/bin/wf-pacman -Sy --noconfirm blocksds-libmad

      # ── 5. Build ARM7 and ARM9 in parallel ────────────────────────────────
      - name: Build ARM7
        run: make -f arm7/Makefile -j$(nproc)

      - name: Build ARM9
        run: make -f arm9/Makefile -j$(nproc)

      # ── 6. Link final ROM ─────────────────────────────────────────────────
      - name: Link ROM
        run: make DSi_MP3_Player.nds

      # ── 7. Verify ROM size (DSi card limit: 32 MB) ────────────────────────
      - name: Verify ROM size
        run: |
          SIZE=$(stat -c%s DSi_MP3_Player.nds)
          MAX=$((32 * 1024 * 1024))
          echo "ROM size: $SIZE bytes (limit: $MAX)"
          if [ "$SIZE" -gt "$MAX" ]; then
            echo "::error file=DSi_MP3_Player.nds::ROM exceeds 32 MB DSi card limit ($SIZE bytes)"
            exit 1
          fi

      # ── 8. Upload .nds as a build artifact ────────────────────────────────
      - name: Upload ROM artifact
        uses: actions/upload-artifact@v4
        with:
          name: DSi_MP3_Player-${{ github.sha }}
          path: DSi_MP3_Player.nds
          retention-days: 14

      # ── 9. Comment download link on pull requests ─────────────────────────
      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `### Build succeeded\n\nDownload **DSi_MP3_Player.nds** from the [Actions run](${runUrl}) artifacts tab.\n\nCommit: \`${context.sha.slice(0,7)}\``
            });

      # ── 10. Annotate failure clearly ──────────────────────────────────────
      - name: Annotate on failure
        if: failure()
        run: |
          echo "::error::Build failed — check the steps above for details"
