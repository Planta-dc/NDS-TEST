name: Build NDS App

on:
  push:
    branches: ["*"]

jobs:
  build:
    runs-on: ubuntu-latest
    container: skylyrac/blocksds:slim-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup environment
        run: git config --global safe.directory '*'

      - name: Build
        run: make

      - name: Upload ROM
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: "*.nds"
          if-no-files-found: error
