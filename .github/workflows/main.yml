name: Build NDS Homebrew

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      # Use the official BlocksDS image which contains the tools your Makefile needs
      
      image: ghcr.io/blocksds/sdk:master-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build project
        run: |
          # The image sets BLOCKSDS and BLOCKSDSEXT automatically,
          # but we ensure the environment is ready for the make command.
          make

      - name: Upload NDS artifact
        uses: actions/upload-artifact@v4
        with:
          name: DSi-MP3-Player-Build
          path: "*.nds"
          if-no-files-found: error
